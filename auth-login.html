<head>
  <meta charset="UTF-8">

  <title>Login - Micap AI ROI Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0E0D0B 0%, #1a1917 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: rgba(20, 19, 17, 0.8);
      border: 1px solid rgba(186, 117, 23, 0.2);
      border-radius: 12px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo img {
      width: 50px;
      height: 50px;
      margin-bottom: 10px;
    }
    .logo h1 {
      color: #F5F0E8;
      font-size: 24px;
      font-weight: 600;
    }
    .logo p {
      color: #9C9888;
      font-size: 12px;
      margin-top: 5px;
    }
    .section-title {
      color: #F5F0E8;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }
    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid rgba(186, 117, 23, 0.3);
      background: rgba(30, 28, 25, 0.6);
      color: #F5F0E8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }
    .oauth-btn:hover {
      background: rgba(186, 117, 23, 0.1);
      border-color: rgba(186, 117, 23, 0.5);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(186, 117, 23, 0.2);
    }
    .divider-text {
      color: #9C9888;
      font-size: 12px;
      font-weight: 500;
    }
    .email-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      color: #F5F0E8;
      font-size: 13px;
      font-weight: 500;
    }
    .form-group input {
      padding: 10px 12px;
      border: 1px solid rgba(186, 117, 23, 0.3);
      background: rgba(30, 28, 25, 0.6);
      color: #F5F0E8;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #BA7517;
      background: rgba(30, 28, 25, 0.8);
    }
    .consent-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 15px 0;
      padding: 12px;
      background: rgba(186, 117, 23, 0.05);
      border-radius: 6px;
      border: 1px solid rgba(186, 117, 23, 0.1);
    }
    .consent-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #BA7517;
    }
    .consent-checkbox label {
      color: #9C9888;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
    }
    .consent-checkbox label strong {
      color: #F5F0E8;
    }
    .submit-btn {
      padding: 12px 16px;
      background: linear-gradient(135deg, #BA7517 0%, #D4A574 100%);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(186, 117, 23, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error-message {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    .success-message {
      color: #51cf66;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
  </style>

    <!-- Meta Pixel Code -->

    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1012037731152333');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1012037731152333&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <script src="/meta-pixel-events.js"></script>
    <script>
      // Track lead form page view
      if (typeof MetaPixelEvents !== 'undefined') {
        MetaPixelEvents.trackPageView('Lead Capture - Email');
      }
    </script>
  </head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663473200649/hUUaHIjRLGNJNfOi.jpg" alt="Micap AI">
      <h1>Micap AI</h1>
      <p>Strategic AI & Agentic Automation Experts</p>
    </div>

    <div class="section-title">Get Your Free ROI Analysis</div>

    <!-- OAuth Buttons -->
    <div class="oauth-buttons">
      <button class="oauth-btn" onclick="loginWithGoogle()">
        <span>🔐</span> Login with Google
      </button>
      <button class="oauth-btn" onclick="alert('Microsoft login coming soon')">
        <span>🔐</span> Login with Microsoft
      </button>
      <button class="oauth-btn" onclick="alert('Meta login coming soon')">
        <span>🔐</span> Login with Meta
      </button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">OR</div>
      <div class="divider-line"></div>
    </div>

    <!-- Email Login Form -->
    <form class="email-form" onsubmit="handleEmailLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required>
        <div class="error-message" id="emailError"></div>
      </div>

      <!-- Consent Checkbox -->
      <div class="consent-checkbox">
        <input type="checkbox" id="consent" name="consent" required>
        <label for="consent">
          I consent to be contacted by <strong>Micap AI LLC</strong> regarding my AI automation analysis and services.
        </label>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Send Verification Code</button>
      <div class="error-message" id="submitError"></div>
      <div class="success-message" id="submitSuccess"></div>
    </form>
  </div>

  <script>
    // Google OAuth Login
    function loginWithGoogle() {
      const clientId = 'YOUR_GOOGLE_CLIENT_ID';
      const redirectUri = `${window.location.origin}/api/auth/callback`;
      const scope = 'openid profile email';
      
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${clientId}&` +
        `redirect_uri=${encodeURIComponent(redirectUri)}&` +
        `response_type=code&` +
        `scope=${encodeURIComponent(scope)}`;
      
      window.location.href = authUrl;
    }

    // Email Login Handler
    async function handleEmailLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const consent = document.getElementById('consent').checked;
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('submitError');
      const successDiv = document.getElementById('submitSuccess');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      if (!consent) {
        errorDiv.textContent = 'Please consent to be contacted by Micap AI LLC';
        errorDiv.style.display = 'block';
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      
      try {
        const response = await fetch('/api/auth/send-verification-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, consent })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Failed to send verification code');
        }
        
        // Track lead form submission with Meta Pixel
        if (typeof MetaPixelEvents !== 'undefined') {
          MetaPixelEvents.trackLeadFormSubmit(email, null);
        }
        
        successDiv.textContent = 'Verification code sent! Check your email.';
        successDiv.style.display = 'block';
        
        // Redirect to verification page after 2 seconds
        setTimeout(() => {
          window.location.href = `/auth-verify.html?email=${encodeURIComponent(email)}`;
        }, 2000);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Verification Code';
      }
    }
  </script>
</body>
</html>
