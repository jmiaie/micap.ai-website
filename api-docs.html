<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micap AI API Documentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@3/swagger-ui.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
    }
    .topbar {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 20px;
      color: white;
      border-bottom: 3px solid #BA7517;
    }
    .topbar h1 {
      margin: 0;
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      color: #BA7517;
    }
    .topbar p {
      margin: 5px 0 0 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #ccc;
    }
    #swagger-ui {
      max-width: 1400px;
      margin: 0 auto;
    }
    .swagger-ui .topbar {
      display: none;
    }
    .swagger-ui .info .title {
      color: #BA7517;
    }
    .swagger-ui .btn {
      background-color: #BA7517;
      border-color: #BA7517;
    }
    .swagger-ui .btn:hover {
      background-color: #8a5a0f;
    }
    .swagger-ui .model-box {
      background: #f5f5f5;
      border: 1px solid #ddd;
    }
    .swagger-ui .scheme-container {
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🔌 Micap AI API</h1>
    <p>Enterprise AI Automation Platform - Interactive API Documentation</p>
  </div>
  
  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@3/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@3/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function() {
      const ui = SwaggerUIBundle({
        url: "/openapi.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        tryItOutEnabled: true,
        requestInterceptor: (request) => {
          // Add session token if available
          const sessionToken = localStorage.getItem('sessionToken');
          if (sessionToken) {
            request.headers['X-Session-Token'] = sessionToken;
          }
          return request;
        },
        responseInterceptor: (response) => {
          // Store session token if returned
          try {
            const body = JSON.parse(response.text);
            if (body.sessionToken) {
              localStorage.setItem('sessionToken', body.sessionToken);
            }
          } catch (e) {
            // Not JSON
          }
          return response;
        }
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
