<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Verify Phone - Micap AI ROI Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0E0D0B 0%, #1a1917 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .phone-container {
      background: rgba(20, 19, 17, 0.8);
      border: 1px solid rgba(186, 117, 23, 0.2);
      border-radius: 12px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo img {
      width: 50px;
      height: 50px;
      margin-bottom: 10px;
    }
    .logo h1 {
      color: #F5F0E8;
      font-size: 24px;
      font-weight: 600;
    }
    .section-title {
      color: #F5F0E8;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      text-align: center;
    }
    .section-subtitle {
      color: #9C9888;
      font-size: 13px;
      text-align: center;
      margin-bottom: 25px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 15px;
    }
    .form-group label {
      color: #F5F0E8;
      font-size: 13px;
      font-weight: 500;
    }
    .form-group input {
      padding: 10px 12px;
      border: 1px solid rgba(186, 117, 23, 0.3);
      background: rgba(30, 28, 25, 0.6);
      color: #F5F0E8;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #BA7517;
      background: rgba(30, 28, 25, 0.8);
    }
    .code-input {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .code-digit {
      width: 50px;
      height: 50px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 1px solid rgba(186, 117, 23, 0.3);
      background: rgba(30, 28, 25, 0.6);
      color: #F5F0E8;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .code-digit:focus {
      outline: none;
      border-color: #BA7517;
      background: rgba(30, 28, 25, 0.8);
    }
    .submit-btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #BA7517 0%, #D4A574 100%);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(186, 117, 23, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .skip-btn {
      width: 100%;
      padding: 10px 16px;
      background: transparent;
      color: #BA7517;
      border: 1px solid rgba(186, 117, 23, 0.3);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .skip-btn:hover {
      background: rgba(186, 117, 23, 0.1);
    }
    .error-message {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      text-align: center;
    }
    .success-message {
      color: #51cf66;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      text-align: center;
    }
    .info-box {
      background: rgba(186, 117, 23, 0.05);
      border: 1px solid rgba(186, 117, 23, 0.1);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .info-box p {
      color: #9C9888;
      font-size: 12px;
      line-height: 1.4;
      margin: 0;
    }
    .info-box strong {
      color: #BA7517;
    }
  </style>

    <script src="/meta-pixel-events.js"></script>

      // Track phone verification page view
      if (typeof MetaPixelEvents !== 'undefined') {
        MetaPixelEvents.trackPageView('Phone Verification');
      }

  </head>
<body>
  <div class="phone-container">
    <div class="logo">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663473200649/hUUaHIjRLGNJNfOi.jpg" alt="Micap AI">
      <h1>Micap AI</h1>
    </div>

    <div class="section-title">Verify Your Phone Number</div>
    <div class="section-subtitle">Complete your lead profile to unlock your free eBook</div>

    <div class="info-box">
      <p><strong>Unlock Value:</strong> Verify your phone to receive your free eBook ($50 value) with your ROI report.</p>
    </div>

    <form onsubmit="handlePhoneVerification(event)">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
        <div class="error-message" id="phoneError"></div>
      </div>

      <div class="form-group">
        <label>Verification Code (6 digits)</label>
      </div>

      <div class="code-input" id="codeInput">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
        <input type="text" class="code-digit" maxlength="1" inputmode="numeric" autocomplete="off">
      </div>

      <button type="submit" class="submit-btn" id="verifyBtn">Verify & Get eBook</button>
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <button type="button" class="skip-btn" onclick="skipPhoneVerification()">Skip for Now</button>
    </form>
  </div>

  <!-- Firebase Phone Authentication Placeholder -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script>
    // Firebase Configuration - REPLACE WITH YOUR CREDENTIALS
    // Get these from: https://console.firebase.google.com/
    // Steps: 1) Create Firebase project, 2) Enable Phone Authentication, 3) Copy config
    const firebaseConfig = {
      apiKey: 'YOUR_API_KEY_HERE',
      authDomain: 'YOUR_AUTH_DOMAIN_HERE',
      projectId: 'YOUR_PROJECT_ID_HERE',
      storageBucket: 'YOUR_STORAGE_BUCKET_HERE',
      messagingSenderId: 'YOUR_MESSAGING_SENDER_ID_HERE',
      appId: 'YOUR_APP_ID_HERE'
    };

    let firebaseInitialized = false;
    if (firebaseConfig.apiKey !== 'YOUR_API_KEY_HERE') {
      try {
        firebase.initializeApp(firebaseConfig);
        firebaseInitialized = true;
      } catch (error) {
        console.warn('Firebase not fully configured. Using placeholder mode.');
      }
    }
  </script>

  <script>
    // Auto-focus next digit
    const codeInputs = document.querySelectorAll('.code-digit');
    codeInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value && index < codeInputs.length - 1) {
          codeInputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          codeInputs[index - 1].focus();
        }
      });
    });

    // Get session from localStorage
    const sessionToken = localStorage.getItem('sessionToken');
    const userEmail = localStorage.getItem('userEmail');

    if (!sessionToken || !userEmail) {
      window.location.href = '/auth-login.html';
    }

    // Handle phone verification
    async function handlePhoneVerification(event) {
      event.preventDefault();

      const phone = document.getElementById('phone').value;
      const code = Array.from(codeInputs).map(input => input.value).join('');
      const verifyBtn = document.getElementById('verifyBtn');
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (code.length !== 6) {
        errorDiv.textContent = 'Please enter all 6 digits';
        errorDiv.style.display = 'block';
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';

      try {
        const response = await fetch('/api/auth/verify-phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionToken,
            phone,
            code
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Phone verification failed');
        }

        // Track phone verification success with Meta Pixel
        if (typeof MetaPixelEvents !== 'undefined') {
          MetaPixelEvents.trackPhoneVerification();
        }
        
        successDiv.textContent = 'Phone verified! Preparing your eBook...';
        successDiv.style.display = 'block';

        // Store phone and redirect to download
        localStorage.setItem('phoneVerified', 'true');
        setTimeout(() => {
          window.location.href = `/report-download.html?leadId=${data.leadId}`;
        }, 1500);
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify & Get eBook';
      }
    }

    // Skip phone verification
    function skipPhoneVerification() {
      if (confirm('Skip phone verification? You can still access your ROI report, but won\'t receive the free eBook.')) {
        localStorage.setItem('phoneVerified', 'false');
        window.location.href = '/report-download.html?leadId=temp';
      }
    }
  </script>
</body>
</html>
